gate: async-review
description: Async message/event-specific quality gate aligned with canonical Kafka example.
spec: integration-standard-kit/spec-kit/async-message.schema.yaml
canonicalExample: integration-standard-kit/examples/async-message-example.md

blockingChecks:
  - id: ASYNC-GATE-001
    check: general_info_complete
    description: General info includes producer, consumers, protocol, topic, partition key, retention, delivery guarantee, schema version and compatibility strategy.
  - id: ASYNC-GATE-002
    check: consumer_info_documented
    description: Consumer table includes consumer group, retry policy, DLQ topic and idempotency.
  - id: ASYNC-GATE-003
    check: headers_documented
    description: Kafka headers include message id, correlation id, event type, schema version, source and content type.
  - id: ASYNC-GATE-004
    check: envelope_documented
    description: Envelope contains metadata and payload with canonical metadata fields.
  - id: ASYNC-GATE-005
    check: metadata_parameters_documented
    description: Metadata table includes messageId, correlationId, timestamp, eventType, version and source with validation/examples.
  - id: ASYNC-GATE-006
    check: payload_parameters_documented
    description: Payload table includes type, required flag, description, validation, default, example and mapping.
  - id: ASYNC-GATE-007
    check: conditional_requiredness_documented
    description: Conditional payload branches have a condition table.
  - id: ASYNC-GATE-008
    check: enums_documented
    description: eventType and other enum fields list values, descriptions and publication conditions.
  - id: ASYNC-GATE-009
    check: partition_key_documented
    description: Partition key table describes field, type, meaning and ordering effect.
  - id: ASYNC-GATE-010
    check: schema_documented
    description: JSON Schema or Avro Schema includes metadata, payload, required fields and validation constraints.
  - id: ASYNC-GATE-011
    check: examples_present
    description: Happy path event example includes topic, key, headers and full payload.
  - id: ASYNC-GATE-012
    check: retry_dlq_documented
    description: Retry and DLQ behavior are documented for every known consumer.

warningChecks:
  - id: ASYNC-WARN-001
    check: partition_key_missing
    description: Partition key is missing for Kafka event.
  - id: ASYNC-WARN-002
    check: consumer_group_missing
    description: Consumer group is missing for Kafka consumer.
  - id: ASYNC-WARN-003
    check: compatibility_strategy_missing
    description: Schema compatibility strategy is missing when schema registry is used.
  - id: ASYNC-WARN-004
    check: idempotency_missing
    description: Consumer idempotency key is not documented.
  - id: ASYNC-WARN-005
    check: event_variants_missing
    description: Significant eventType variants are not documented with examples or payload differences.
