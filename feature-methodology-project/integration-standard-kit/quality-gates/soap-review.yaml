gate: soap-review
description: SOAP-specific quality gate aligned with canonical SOAP example.
spec: integration-standard-kit/spec-kit/soap-operation.schema.yaml
canonicalExample: integration-standard-kit/examples/soap-operation-example.md

blockingChecks:
  - id: SOAP-GATE-001
    check: operation_name_present
    description: SOAP operation name and purpose are documented.
  - id: SOAP-GATE-002
    check: general_info_complete
    description: General info includes WSDL, endpoint, namespace, SOAPAction, auth and integration boundary.
  - id: SOAP-GATE-003
    check: http_headers_documented
    description: Transport-level HTTP headers are documented.
  - id: SOAP-GATE-004
    check: soap_header_documented
    description: HTTP headers and SOAP Header are documented separately.
  - id: SOAP-GATE-005
    check: response_headers_documented
    description: Response headers section explains metadata and fault behavior.
  - id: SOAP-GATE-006
    check: xsd_schema_documented
    description: XSD schema includes request, response, complex types and enum definitions.
  - id: SOAP-GATE-007
    check: request_response_parameters_documented
    description: Request and response parameter tables include XSD type, requiredness, validation/default/example and mapping where applicable.
  - id: SOAP-GATE-008
    check: conditional_requiredness_documented
    description: Conditional fields have a separate condition table.
  - id: SOAP-GATE-009
    check: request_response_examples_present
    description: SOAP request and response examples are present.
  - id: SOAP-GATE-010
    check: boundary_case_documented
    description: Empty collection or equivalent boundary behavior is documented when applicable.
  - id: SOAP-GATE-011
    check: fault_model_documented
    description: SOAP Fault codes include faultcode, errorCode and description.

warningChecks:
  - id: SOAP-WARN-001
    check: ws_security_unclear
    description: WS-Security method is not described.
  - id: SOAP-WARN-002
    check: enumeration_descriptions_missing
    description: XSD enum values are listed without descriptions.
  - id: SOAP-WARN-003
    check: xsd_restrictions_missing
    description: XSD minLength, maxLength, pattern, minInclusive or enum restrictions are missing from parameter tables.
  - id: SOAP-WARN-004
    check: soap_fault_detail_missing
    description: SOAP Fault detail fields are not described.
