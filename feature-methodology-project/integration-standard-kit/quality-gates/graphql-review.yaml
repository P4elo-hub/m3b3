gate: graphql-review
description: GraphQL-specific quality gate aligned with canonical GraphQL example.
spec: integration-standard-kit/spec-kit/graphql-operation.schema.yaml
canonicalExample: integration-standard-kit/examples/graphql-operation-example.md

blockingChecks:
  - id: GQL-GATE-001
    check: operation_type_present
    description: Query, Mutation or Subscription type is documented.
  - id: GQL-GATE-002
    check: general_info_complete
    description: General info table includes source, target, protocol, direction, operation type and auth.
  - id: GQL-GATE-003
    check: request_response_headers_documented
    description: Request and response headers are documented because GraphQL runs over HTTP.
  - id: GQL-GATE-004
    check: schema_definition_present
    description: Schema definition includes operation, returned types, custom types and enums when present.
  - id: GQL-GATE-005
    check: arguments_documented
    description: Arguments include type, requiredness, validation, default and example.
  - id: GQL-GATE-006
    check: conditional_requiredness_documented
    description: Conditional arguments such as cursor have a separate condition table.
  - id: GQL-GATE-007
    check: response_fields_documented
    description: Response fields include type, requiredness, validation, default, example and mapping.
  - id: GQL-GATE-008
    check: relay_pagination_documented_for_lists
    description: List queries document Connection, edges, node, cursor, pageInfo and totalCount.
  - id: GQL-GATE-009
    check: json_schemas_present
    description: JSON Schema for query variables and response is present when canonical format requires it.
  - id: GQL-GATE-010
    check: errors_documented
    description: GraphQL error codes and HTTP equivalents are documented.
  - id: GQL-GATE-011
    check: examples_present
    description: GraphQL request, happy path response and empty-result/boundary example are present.

warningChecks:
  - id: GQL-WARN-001
    check: relay_pagination_missing_for_list
    description: List query does not document Relay-style pagination or alternative confirmed pattern.
  - id: GQL-WARN-002
    check: http_error_semantics_unclear
    description: Page does not clarify HTTP status vs GraphQL error body semantics.
  - id: GQL-WARN-003
    check: nullable_semantics_unclear
    description: Nullable/non-null fields are not explicit.
  - id: GQL-WARN-004
    check: directives_missing
    description: Relevant directives such as @deprecated or @auth are not documented when present in schema.
