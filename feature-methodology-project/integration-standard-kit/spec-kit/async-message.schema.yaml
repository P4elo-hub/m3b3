exampleRequirements:
  - Happy path event with topic, key and headers.
  - Full event envelope example.
  - Examples for significant event variants when one topic carries multiple eventType values.
  - Boundary cases for nullable fields, empty arrays or optional branches when applicable.

qualityRules:
  - Не указывать delivery guarantee без evidence.
  - Partition key обязателен только если источник подтверждает партиционирование.
  - Retry и DLQ описывать только при наличии конфигурации, кода, ADR или эксплуатационного источника.
  - Envelope содержит `metadata` и `payload`, если проект не использует другой подтвержденный формат.
  - Для Kafka указывать consumer group, retention, partition key и headers, если они есть в источниках.
  - JSON Schema или Avro Schema обязательна для payload, если source стандарта требует schema registry.
  - Metadata table must include `messageId`, `correlationId`, `timestamp`, `eventType`, `version`, `source`.
  - Kafka headers duplicate routing/tracing metadata needed without payload deserialization.
  - Conditional fields must have a separate condition table.
  - Consumer idempotency key must be documented when consumer information is known.
