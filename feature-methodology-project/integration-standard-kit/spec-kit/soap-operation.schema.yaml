qualityRules:
  - SOAP Header and HTTP headers are documented separately.
  - XSD complexType nested structure is described for request and response.
  - Enumeration values include descriptions.
  - SOAP Fault structure is documented with `faultcode`, `faultstring` and `detail`.
  - WSDL URL and endpoint are included only when confirmed by evidence.
  - Response headers section explains that business errors are represented through SOAP Body or SOAP Fault.
  - Empty collection response is documented when response may contain repeated elements.
  - `minOccurs`, `maxOccurs`, restrictions and enum values are preserved from XSD evidence.
  - WS-Security method is documented separately from HTTP authentication.
