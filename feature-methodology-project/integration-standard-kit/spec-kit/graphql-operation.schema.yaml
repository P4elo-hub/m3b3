artifact: graphql-operation
description: Contract for GraphQL query, mutation or subscription documentation.
language: ru

canonicalExample: integration-standard-kit/examples/graphql-operation-example.md
sourceStandardSection: "4.4 GraphQL API; 4.6 Синхронные интеграции; 4.8 Документирование API; 4.9 Примеры"

requiredSections:
  - GraphQL Query / Mutation / Subscription
  - Общая информация
  - Request Headers
  - Response Headers
  - Schema Definition
  - Параметры запроса
  - Условия обязательности
  - Параметры ответа
  - JSON Schema запроса
  - JSON Schema ответа
  - Пример запроса и ответа
  - Пограничный случай
  - Ошибки

generalInfoTable:
  columns:
    - Параметр
    - Значение
  requiredRows:
    - Назначение
    - Система-источник
    - Система-получатель
    - Тип интеграции
    - Протокол
    - Направление
    - Тип операции
    - Аутентификация
  conditionalRows:
    - Rate Limit
    - Timeout
    - Retry Policy

operationTypes:
  - Query
  - Mutation
  - Subscription

schemaRequiredElements:
  - type Query
  - custom types

schemaOptionalElements:
  - type Mutation
  - type Subscription
  - input types
  - enum
  - directives

requestHeaderColumns:
  - Заголовок
  - Обязат.
  - Описание
  - Пример

responseHeaderColumns:
  - Заголовок
  - Описание
  - Пример

fieldColumns:
  - Поле
  - Тип
  - Nullable
  - Описание
  - Аргументы
  - Директивы
  - Пример

argumentColumns:
  - Параметр
  - Тип
  - Обязат.
  - Описание
  - Валидация
  - По умолч.
  - Пример

responseParameterColumns:
  - Параметр
  - Тип
  - Обязат.
  - Описание
  - Валидация
  - По умолч.
  - Пример
  - Маппинг

conditionalRequiredColumns:
  - Параметр
  - Условие обязательности

errorColumns:
  - Код
  - Описание
  - HTTP эквивалент
  - Условие

standardErrorCodes:
  - GRAPHQL_PARSE_FAILED
  - GRAPHQL_VALIDATION_FAILED
  - BAD_USER_INPUT
  - UNAUTHENTICATED
  - FORBIDDEN
  - NOT_FOUND
  - INTERNAL_SERVER_ERROR

pagination:
  recommendedPattern: Relay Connection
  requiredForLists:
    - edges
    - node
    - cursor
    - pageInfo
    - totalCount
  pageInfoFields:
    - hasNextPage
    - hasPreviousPage
    - startCursor
    - endCursor

jsonSchemaRequirements:
  requestVariablesSchemaRequired: true
  responseSchemaRequired: true
  requiredElements:
    - $schema
    - title
    - type
    - required
    - properties
  recommended:
    - additionalProperties
    - definitions

exampleRequirements:
  - GraphQL operation example in `graphql` fenced block.
  - Happy path response in `json` fenced block.
  - Empty result response for list query.
  - Error code table with HTTP equivalents.

qualityRules:
  - GraphQL fields use camelCase.
  - Non-null fields are marked with `!` in schema examples.
  - Error examples use `errors[].extensions.code`.
  - HTTP 200 with GraphQL errors is described when relevant.
  - Relay-style pagination is documented for list queries unless a different confirmed pattern exists.
  - Request and response headers are documented because GraphQL normally runs over HTTP.
  - Input validation is captured in argument table and JSON Schema variables.
  - Nullable fields are explicit in response parameter table.
